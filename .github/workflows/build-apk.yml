name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Install required Android SDK components
        run: |
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "platform-tools" 2>&1 | tail -5

      - name: Setup Gradle 9.3.1
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '9.3.1'

      - name: Build debug APK
        working-directory: android
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          gradle assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             dtwg-android-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dtwg-android-debug
          path: dtwg-android-debug.apk
          retention-days: 90

      - name: Delete previous latest-apk release (if exists)
        run: gh release delete latest-apk --yes 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete previous latest-apk tag (if exists)
        run: git push origin :refs/tags/latest-apk 2>/dev/null || true

      - name: Create latest-apk release
        run: |
          gh release create latest-apk dtwg-android-debug.apk \
            --title "DTWG Android APK — latest build" \
            --notes "## DTWG — Android Debug APK

          Built from commit \`${{ github.sha }}\`

          ### How to install
          1. On your Android phone go to **Settings → Apps → Special app access → Install unknown apps**
          2. Allow installs from your browser or file manager
          3. Download \`dtwg-android-debug.apk\` below and tap **Install**

          ### What this APK does
          - Opens the DTWG PWA in a full-screen native wrapper
          - Live Update notification during daily reading: coloured status-bar chip, accent card, and quick actions
          - Notification actions feed back into the PWA in real time

          > Debug build — safe to sideload; not Play Store signed." \
            --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
